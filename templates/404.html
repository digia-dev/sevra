{% extends "base.html" %}
{% block title %}Not Found{% endblock %}
{% block content %}
<div class="empty-state" style="padding-top:80px">
    <div class="empty-icon" style="font-size:4rem;color:var(--warning)"><i data-lucide="search-x"></i></div>
    <h3>404 — Page Not Found</h3>
    <p>The page you're looking for doesn't exist.</p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary"><i data-lucide="arrow-left" class="icon-sm"></i> Back to Dashboard</a>
</div>
{% endblock %}
