{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<div class="empty-state" style="padding-top:80px">
    <div class="empty-icon" style="font-size:4rem;color:var(--danger)"><i data-lucide="alert-triangle"></i></div>
    <h3>500 — Server Error</h3>
    <p>Something went wrong. This might be a database connection issue.</p>
    <p style="font-size:0.85rem;color:var(--gray-400);max-width:400px;margin:8px auto">
        Make sure your database is connected in the Vercel dashboard.
    </p>
    <a href="{{ url_for('dashboard') }}" class="btn btn-primary"><i data-lucide="refresh-cw" class="icon-sm"></i> Try Again</a>
</div>
{% endblock %}
