{% extends "base.html" %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="page-header">
    <h2>My Profile</h2>
</div>

<div class="form-card">
    <form method="POST" action="{{ url_for('profile') }}" class="styled-form" id="profileForm">
        <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" value="{{ current_user.username }}" class="form-control" disabled>
            <small class="form-hint">Username cannot be changed.</small>
        </div>
        <div class="form-group">
            <label for="full_name">Full Name</label>
            <input type="text" id="full_name" name="full_name" value="{{ current_user.full_name }}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" value="{{ current_user.email }}" class="form-control" required>
        </div>
        <hr class="form-divider">
        <h4>Change Password</h4>
        <p class="form-hint">Leave password fields blank to keep current password.</p>
        <div class="form-group">
            <label for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" class="form-control">
        </div>
        <div class="form-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" class="form-control" minlength="6">
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control">
            <small class="form-hint" id="passMatchHint"></small>
        </div>
        <div class="form-actions">
            <a href="{{ url_for('dashboard') }}" class="btn btn-outline">Cancel</a>
            <button type="submit" class="btn btn-primary"><i data-lucide="save" class="icon-sm"></i> Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
document.getElementById('confirm_password').addEventListener('input', function() {
    var newPass = document.getElementById('new_password').value;
    var hint = document.getElementById('passMatchHint');
    if (!this.value) { hint.textContent = ''; return; }
    hint.textContent = this.value === newPass ? 'Passwords match' : 'Passwords do not match';
    hint.style.color = this.value === newPass ? 'var(--success)' : 'var(--danger)';
});
document.getElementById('profileForm').addEventListener('submit', function(e) {
    var newPass = document.getElementById('new_password').value;
    var confirmPass = document.getElementById('confirm_password').value;
    if (newPass && newPass !== confirmPass) {
        e.preventDefault();
        alert('New passwords do not match.');
    }
});
</script>
{% endblock %}
