{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="form-page">
    <div class="form-card">
        <h2 class="form-title">Create Account</h2>
        <form method="POST" class="styled-form">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                       placeholder="Choose a username" autofocus>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required
                       placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required
                       placeholder="Enter your full name">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="6"
                       placeholder="Create a password (min 6 characters)">
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required
                       placeholder="Confirm your password">
                <small class="form-hint" id="registerPassHint"></small>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>
        <p class="form-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('confirm_password').addEventListener('input', function() {
    var pass = document.getElementById('password').value;
    var hint = document.getElementById('registerPassHint');
    if (!this.value) { hint.textContent = ''; return; }
    hint.textContent = this.value === pass ? 'Passwords match' : 'Passwords do not match';
    hint.style.color = this.value === pass ? 'var(--success)' : 'var(--danger)';
});
</script>
{% endblock %}
